{% extends "base.html" %}

{% block content %}
<section class="demo-panel" data-confetti="true">
  <p class="eyebrow">Fixed Broken Auth</p>
  <h1>Welcome, {{ username }}</h1>
  <p>Your identity is stored in a signed server-side session cookie, not in the URL.</p>

  <form method="post" action="{{ url_for('auth_fixed.logout') }}" data-safe-flow="true">
    <button type="submit">Log out</button>
  </form>
</section>
{% endblock %}
