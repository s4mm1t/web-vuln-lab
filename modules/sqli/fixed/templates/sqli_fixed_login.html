{% extends "base.html" %}

{% block content %}
<section class="demo-panel">
  <p class="eyebrow">Fixed SQL Injection</p>
  <h1>Login with parameterized SQL</h1>
  <p>User input is sent as data through bound parameters, not merged into SQL text.</p>

  <form method="post">
    <label>
      Username
      <input name="username" autocomplete="username" value="admin">
    </label>
    <label>
      Password
      <input name="password" autocomplete="current-password" value="password123">
    </label>
    <button type="submit">Log in</button>
  </form>

  <div class="result safe">
    <strong>Prepared query</strong>
    <pre>{{ query }}</pre>
  </div>

  {% if result %}
  <p class="result safe">{{ result }}</p>
  {% endif %}
</section>
{% endblock %}
